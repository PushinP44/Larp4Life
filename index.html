<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!--
    Security hardening (PENTEST F1). Strict CSP — the app uses one external ES
    module and zero inline scripts / on* handlers (events via data-action
    delegation), so script-src 'self' blocks every injected inline-script and
    onerror payload (backstops the F2 DOM-XSS sinks). 'unsafe-inline' is needed
    ONLY for style attributes — it does NOT permit script execution.
    NOTE: frame-ancestors / X-Frame-Options / X-Content-Type-Options must be set
    as real response headers (ignored in <meta>) — see security/deploy-headers.md.
  -->
  <meta http-equiv="Content-Security-Policy" content="
    default-src 'self';
    script-src 'self';
    style-src 'self' 'unsafe-inline';
    img-src 'self' data:;
    media-src 'self';
    connect-src 'self';
    font-src 'self';
    object-src 'none';
    base-uri 'none';
    form-action 'none';
    frame-ancestors 'none';
  " />
  <meta name="referrer" content="no-referrer" />

  <title>Ecosystem X: The Last Balance</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!--
    Architecture Law 1: ONE canvas. No separate screens.
    All gameplay (map, scan overlay, edge overlay) renders here.
    Only permitted DOM: HUD (inside canvas), overlay panels below.
  -->
  <div id="game-container">
    <canvas id="game" aria-label="Ecosystem X game viewport"></canvas>

    <!--
      #boot-loader: instant first-paint feedback while modules + assets load.
      Shown by default (no JS needed to render it); main.js hides it once the
      world is ready, or replaces its text with a friendly error if boot fails.
      No inline script/handlers — respects the strict CSP (Rule 01).
    -->
    <div id="boot-loader" role="status" aria-live="polite">
      <div class="boot-spinner" aria-hidden="true"></div>
      <p class="boot-title">Ecosystem X</p>
      <p class="boot-sub" id="boot-message">Loading the wetland…</p>
      <noscript>
        <p class="boot-sub">This game needs JavaScript enabled to run.</p>
      </noscript>
    </div>

    <!--
      #overlay: toggled panels rendered OVER the canvas, never replacing it.
      Panels: field-notebook, vendor, start-card, win-card, lose-card.
      All panels injected by notebook.js / vendor.js / main.js as innerHTML.
      Closed with data-action="close" (event delegation in main.js).
    -->
    <div id="overlay" role="dialog" aria-modal="true" hidden></div>

    <!--
      #touch-controls: on-screen controls for touch / no-keyboard devices.
      Hidden on desktop (keyboard + click cover everything); shown via CSS on
      coarse-pointer or narrow screens. All buttons are real <button>s wired
      through data-action / data-dir (event delegation in main.js) — no inline
      handlers, so the strict CSP (Rule 01) is preserved. Also fully usable by
      mouse and keyboard, so it doubles as discoverable desktop controls.
    -->
    <div id="touch-controls" aria-label="Touch controls" hidden>
      <div class="tc-dpad" role="group" aria-label="Move">
        <button class="tc-btn tc-up"    data-dir="up"    aria-label="Move up">▲</button>
        <button class="tc-btn tc-left"  data-dir="left"  aria-label="Move left">◀</button>
        <button class="tc-btn tc-right" data-dir="right" aria-label="Move right">▶</button>
        <button class="tc-btn tc-down"  data-dir="down"  aria-label="Move down">▼</button>
      </div>
      <div class="tc-actions" role="group" aria-label="Actions">
        <button class="tc-action" data-action="open-notebook" aria-label="Field Notebook">📓<span>Notes</span></button>
        <button class="tc-action" data-action="open-vendor"   aria-label="Interventions">🧪<span>Store</span></button>
        <button class="tc-action tc-endday" data-action="endday" aria-label="Advance one day">⏭<span>Next Day</span></button>
      </div>
    </div>
  </div>

  <!-- Single module entry point — no other inline scripts (Rule 01) -->
  <script type="module" src="main.js"></script>
</body>
</html>
